<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        /* Дублируем основные стили для идентичного вида */
        body {
            background: radial-gradient(circle at center, #2c2c2c 0%, #121212 100%);
            min-height: 100vh; display: flex; align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0;
        }
        .login-card {
            background: rgba(40, 40, 40, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            color: white; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 15px !important; color: white !important;
            padding: 12px 16px !important;
        }
        .form-control:focus {
            border-color: #ffc107 !important; box-shadow: 0 0 15px rgba(255, 193, 7, 0.2) !important;
            outline: none; background: rgba(255, 255, 255, 0.1) !important;
        }
        .btn-warning {
            background: linear-gradient(45deg, #ffc107, #ff9800);
            border: none; border-radius: 15px; padding: 14px;
            font-weight: 800; color: #000; width: 100%;
        }
        .text-gold { color: #ffc107; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock text-gold" style="font-size: 2.5rem;"></i>
                    <h2 class="fw-bold mt-2">Сброс <span class="text-gold">пароля</span></h2>
                    <p class="text-white-50 small">Введите email, и мы отправим ссылку для восстановления</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="small text-white-50 mb-1 ms-1">Ваш Email</label>
                        <input type="email" name="email" class="form-control" placeholder="example@mail.com" required>
                    </div>

                    <button type="submit" class="btn btn-warning shadow-sm">ОТПРАВИТЬ ИНСТРУКЦИИ</button>
                </form>

                <div class="text-center mt-4">
                    <a href="{% url 'login' %}" class="text-white-50 text-decoration-none small">
                        <i class="bi bi-arrow-left"></i> Вернуться ко входу
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
