{% for item in cart %}
    {% with product=item.product %}
    <tr id="row-{{ product.id }}">
        <td>
            <div class="d-flex align-items-center">
                {% if product.image %}
                <img src="{{ product.image.url }}" width="50" height="50" class="rounded-3 me-3 object-fit-cover">
                {% endif %}
                <div>
                    <div class="fw-bold">{{ product.name }}</div>
                    <div class="small text-muted">{{ product.weight }}г</div>
                </div>
            </div>
        </td>
        <td class="text-center">
            <div class="qty-controls d-inline-flex align-items-center bg-light rounded-pill p-1">
                <button type="button" 
                        onclick="updateCartQuantity('{{ product.id }}', 'subtract')" 
                        class="btn btn-sm btn-white rounded-circle shadow-sm" 
                        style="width:30px; height:30px;">-</button>
                
                <span class="mx-3 fw-bold" id="quantity-{{ product.id }}">{{ item.quantity }}</span>
                
                <button type="button" 
                        onclick="updateCartQuantity('{{ product.id }}', 'add')" 
                        class="btn btn-sm btn-white rounded-circle shadow-sm" 
                        style="width:30px; height:30px;">+</button>
            </div>
        </td>
        <td class="text-end fw-bold" id="item-total-{{ product.id }}">
            {{ item.total_price }} ₽
        </td>
        <td class="text-end">
            <button type="button" 
                    onclick="updateCartQuantity('{{ product.id }}', 'remove')" 
                    class="btn btn-link text-danger p-0 border-0">
                <i class="bi bi-trash fs-5"></i>
            </button>
        </td>
    </tr>
    {% endwith %}
{% endfor %}
