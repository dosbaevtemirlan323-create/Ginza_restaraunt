<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: radial-gradient(circle at center, #2c2c2c 0%, #121212 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
        }
        .login-card {
            background: rgba(40, 40, 40, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: white;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .text-gold { color: #ffc107; }
        .btn-warning {
            background: linear-gradient(45deg, #ffc107, #ff9800);
            border: none;
            border-radius: 15px;
            padding: 14px;
            font-weight: 800;
            color: #000;
            width: 100%;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.3);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card p-5">
                <i class="bi bi-check-circle-fill text-gold mb-4" style="font-size: 4rem;"></i>
                <h2 class="fw-bold mb-3">Пароль <span class="text-gold">изменен</span></h2>
                <p class="text-white-50 mb-4">Вы успешно обновили свой пароль. Теперь можно войти в систему под новыми данными.</p>
                
                <a href="{% url 'login' %}" class="btn btn-warning shadow-sm">ВОЙТИ В АККАУНТ</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
