<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: radial-gradient(circle at center, #2c2c2c 0%, #121212 100%);
            min-height: 100vh; display: flex; align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0;
        }
        .login-card {
            background: rgba(40, 40, 40, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            color: white; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .text-gold { color: #ffc107; }
        .btn-warning {
            background: linear-gradient(45deg, #ffc107, #ff9800);
            border: none; border-radius: 15px; padding: 12px;
            font-weight: 800; color: #000; width: 100%; text-decoration: none; display: inline-block;
        }
    </style>
</head>
<body>
<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card p-4 p-md-5">
                <i class="bi bi-envelope-check text-gold" style="font-size: 3.5rem;"></i>
                <h2 class="fw-bold mt-3">Проверьте <span class="text-gold">почту</span></h2>
                <p class="text-white-50 mt-3">Инструкции по восстановлению пароля были отправлены на ваш электронный адрес.</p>
                <p class="small text-white-50">Если письмо не пришло, проверьте папку «Спам».</p>
                
                <div class="mt-4">
                    <a href="{% url 'login' %}" class="btn btn-warning shadow-sm">ПОНЯТНО</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
