{% extends 'base.html' %}

{% block title %}Ginza Delivery — Байконур{% endblock %}

{% block extra_css %}
<style>
    /* Твои стили для баннера «Вкус совершенства» */
    .hero-section {
        background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('/static/images/hero.jpg');
        height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        text-align: center;
        position: relative;
    }
    
    /* Плавающая кнопка меню */
    .floating-menu-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 1050;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ffc107, #ff9800);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        transition: all 0.3s ease;
        text-decoration: none;
        cursor: pointer;
        border: none;
    }
    
    .floating-menu-btn:hover {
        transform: scale(1.1) rotate(5deg);
        background: linear-gradient(135deg, #ff9800, #ffc107);
        box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    }
    
    .floating-menu-btn i {
        font-size: 28px;
        color: #000;
    }
    
    /* Анимация пульсации для привлечения внимания */
    @keyframes pulse-gold {
        0% {
            box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.7);
        }
        70% {
            box-shadow: 0 0 0 15px rgba(255, 193, 7, 0);
        }
        100% {
            box-shadow: 0 0 0 0 rgba(255, 193, 7, 0);
        }
    }
    
    .floating-menu-btn {
        animation: pulse-gold 2s infinite;
    }
    
    /* На мобильных устройствах кнопка чуть выше */
    @media (max-width: 768px) {
        .floating-menu-btn {
            bottom: 90px;
            right: 20px;
            width: 50px;
            height: 50px;
        }
        .floating-menu-btn i {
            font-size: 24px;
        }
    }
    
    /* Если есть плавающая корзина, кнопка меню будет слева */
    @media (max-width: 991px) {
        .floating-menu-btn {
            bottom: 100px;
            right: 20px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="hero-section">
    <div>
        <h1 class="display-1 fw-bold">Вкус совершенства</h1>
        <p class="fs-4 mb-5">Лучшая японская кухня в Байконуре с доставкой до двери.</p>
        <a href="{% url 'menu' %}" class="btn btn-warning btn-xl rounded-pill px-5 py-3 fw-bold">ЗАКАЗАТЬ СЕЙЧАС</a>
    </div>
</div>

<!-- Плавающая кнопка меню -->
<a href="{% url 'menu' %}" class="floating-menu-btn shadow-lg" title="Перейти в меню">
    <i class="bi bi-grid-3x3-gap-fill"></i>
</a>
{% endblock %}
