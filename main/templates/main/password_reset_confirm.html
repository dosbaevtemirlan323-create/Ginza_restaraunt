<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        /* Дублируем основные стили Ginza для идентичного вида */
        body {
            background: radial-gradient(circle at center, #2c2c2c 0%, #121212 100%);
            min-height: 100vh; display: flex; align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0;
        }

        .login-card {
            background: rgba(40, 40, 40, 0.7); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px; color: white; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Принудительная стилизация полей */
        input[type="password"], input[type="text"], .form-control {
            width: 100% !important; display: block !important;
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 15px !important; color: white !important;
            padding: 12px 16px !important; transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: #ffc107 !important;
            box-shadow: 0 0 15px rgba(255, 193, 7, 0.2) !important;
            outline: none;
        }

        label {
            display: block; width: 100%; text-align: left;
            font-size: 0.85rem; color: rgba(255, 255, 255, 0.6);
            margin-bottom: 6px; padding-left: 4px;
        }

        .btn-warning {
            background: linear-gradient(45deg, #ffc107, #ff9800);
            border: none; border-radius: 15px; padding: 14px;
            font-weight: 800; color: #000; width: 100%;
            margin-top: 1rem; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.3);
        }

        .text-gold { color: #ffc107; }
        
        /* Убираем стандартные рамки браузера у инпутов */
        ::placeholder { color: rgba(255,255,255,0.3) !important; }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card p-4 p-md-5">
                
                {% if validlink %}
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Новый <span class="text-gold">пароль</span></h2>
                    <p class="text-white-50 small mb-0">Придумайте надежный пароль</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}">
                            {{ field.label }}
                        </label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1 text-start ms-1" style="font-size: 0.75rem;">
                                {{ field.errors|first }}
                            </div>
                        {% endif %}
                    </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-warning shadow-sm">СОХРАНИТЬ</button>
                </form>

                {% else %}
                <div class="text-center">
                    <i class="bi bi-x-circle-fill text-danger" style="font-size: 3rem;"></i>
                    <h2 class="fw-bold mt-3">Ошибка <span class="text-gold">токена</span></h2>
                    <p class="text-white-50 mt-3">Эта ссылка больше не действительна.</p>
                    <a href="{% url 'password_reset' %}" class="btn btn-warning mt-3">ЗАПРОСИТЬ ЗАНОВО</a>
                </div>
                {% endif %}

            </div>
        </div>
    </div>
</div>

</body>
</html>
