{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow rounded-4 border-0">
                <div class="card-header bg-dark text-white py-3" style="border-radius: 1.2rem 1.2rem 0 0;">
                    <h4 class="mb-0 fw-bold">
                        <i class="bi bi-pencil-square me-2"></i>Редактировать: {{ product.name }}
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-tag me-1 text-warning"></i>Название блюда
                            </label>
                            <input type="text" name="name" class="form-control rounded-pill" value="{{ product.name }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-card-text me-1 text-warning"></i>Описание
                            </label>
                            <textarea name="description" class="form-control rounded-3" rows="3" placeholder="Состав блюда, особенности...">{{ product.description }}</textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-currency-ruble me-1 text-warning"></i>Цена (₽)
                                </label>
                                <input type="number" step="0.01" name="price" class="form-control rounded-pill" value="{{ product.price|stringformat:'.2f'|safe }}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-scale me-1 text-warning"></i>Вес (гр)
                                </label>
                                <input type="number" name="weight" class="form-control rounded-pill" value="{{ product.weight }}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-fire me-1 text-warning"></i>Калорийность (ккал)
                                </label>
                                <input type="number" name="calories" class="form-control rounded-pill" 
                                        value="{{ product.calories|default:0 }}" 
                                        placeholder="Калории ккал" min="0" max="2000" step="1">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-grid me-1 text-warning"></i>Категория
                            </label>
                            <select name="category" class="form-select rounded-pill">
                                {% for category in categories %}
                                <option value="{{ category.id }}" {% if category.id == product.category.id %}selected{% endif %}>
                                    {{ category.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="is_active" id="activeSwitch" {% if product.is_active %}checked{% endif %}>
                                <label class="form-check-label fw-bold" for="activeSwitch">
                                    <i class="bi bi-eye me-1 text-warning"></i>В наличии (видно в меню)
                                </label>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">
                                <i class="bi bi-image me-1 text-warning"></i>Фотография блюда
                            </label>
                            <input type="file" name="image" class="form-control rounded-pill" accept="image/*">
                            {% if product.image %}
                                <div class="mt-2 p-2 bg-light rounded-3 d-flex align-items-center gap-2">
                                    <img src="{{ product.image.url }}" width="50" height="50" class="rounded-3 object-fit-cover">
                                    <div class="small text-muted">Текущее фото: {{ product.image.name }}</div>
                                </div>
                            {% endif %}
                        </div>
                        
                        <div class="alert alert-info small rounded-4">
                            <i class="bi bi-info-circle-fill me-2"></i>
                            После сохранения изменения сразу отобразятся в меню.
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning fw-bold py-2 rounded-pill">
                                <i class="bi bi-save me-2"></i>Сохранить изменения
                            </button>
                            <a href="{% url 'menu' %}" class="btn btn-outline-secondary rounded-pill">
                                <i class="bi bi-arrow-left me-2"></i>Вернуться в меню
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control:focus, .form-select:focus {
        border-color: #ffc107;
        box-shadow: 0 0 0 0.2rem rgba(255, 193, 7, 0.25);
    }
    .object-fit-cover {
        object-fit: cover;
    }
</style>
{% endblock %}
