<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: radial-gradient(circle at center, #2c2c2c 0%, #121212 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
        }
        .login-card {
            background: rgba(40, 40, 40, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: white;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .form-group {
            width: 100%;
            margin-bottom: 1.2rem;
            text-align: left;
        }
        input[type="text"], input[type="password"], .form-control {
            width: 100% !important;
            display: block !important;
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 15px !important;
            color: white !important;
            padding: 12px 16px !important;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        input:focus {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: #ffc107 !important;
            box-shadow: 0 0 15px rgba(255, 193, 7, 0.2) !important;
            outline: none;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 6px;
            padding-left: 4px;
        }
        .btn-warning {
            background: linear-gradient(45deg, #ffc107, #ff9800);
            border: none;
            border-radius: 15px;
            padding: 14px;
            font-weight: 800;
            color: #000;
            width: 100%;
            margin-top: 1rem;
        }
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.3);
        }
        .brand-logo { font-size: 2rem; letter-spacing: -1px; }
        .text-gold { color: #ffc107; }
        hr { border-top: 1px solid rgba(255,255,255,0.1); margin: 1.5rem 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold brand-logo">GINZA<span class="text-gold">.</span></h2>
                    <p class="text-white-50 small mb-0">Добро пожаловать в доставку</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="form-group">
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {% if field.name == 'password' %}
                        <div class="text-end mt-1">
                            <a href="{% url 'password_reset' %}" class="text-white-50 small text-decoration-none" style="font-size: 0.75rem;">Забыли пароль?</a>
                        </div>
                        {% endif %}
                        {% if field.errors %}
                            <div class="text-danger small mt-1 ms-1">{{ field.errors|first }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-warning shadow-sm">ВОЙТИ</button>
                </form>
                <div class="text-center mt-4">
                    <p class="small text-white-50 mb-1">Нет аккаунта? <a href="{% url 'register' %}" class="text-gold text-decoration-none fw-bold">Создать</a></p>
                    <hr>
                    <a href="{% url 'start' %}" class="text-white-50 text-decoration-none small"><i class="bi bi-chevron-left"></i> На главную</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
